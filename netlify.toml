# ── Redirects: forzar URLs limpias sin .html (301 permanente) ──
[[redirects]]
  from = "/guia-punta-cana.html"
  to = "/guia-punta-cana"
  status = 301
  force = true

[[redirects]]
  from = "/guia-santo-domingo.html"
  to = "/guia-santo-domingo"
  status = 301
  force = true

[[redirects]]
  from = "/guia-barahona.html"
  to = "/guia-barahona"
  status = 301
  force = true

[[redirects]]
  from = "/guia-santiago.html"
  to = "/guia-santiago"
  status = 301
  force = true

[[redirects]]
  from = "/guia-vuelos-nyc-rd.html"
