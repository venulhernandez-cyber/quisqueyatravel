name: Add Custom Domain to Cloudflare Pages

on:
  workflow_dispatch:

jobs:
  add-domain:
    runs-on: ubuntu-latest
    steps:
      - name: Add quisqueyatravel.org as custom domain
        run: |
          RESULT=$(curl -s -X POST "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects/quisqueyatravel/domains" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"name":"quisqueyatravel.org"}')
          echo "Response: $RESULT"
