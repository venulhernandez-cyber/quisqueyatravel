name: Purge Cloudflare Zone Cache

on:
  workflow_dispatch:

jobs:
  purge:
    runs-on: ubuntu-latest
    steps:
      - name: Get Zone ID and Purge Cache
        run: |
          ZONE_ID=$(curl -s "https://api.cloudflare.com/client/v4/zones?name=quisqueyatravel.org" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['result'][0]['id'])")
          echo "Zone ID: $ZONE_ID"
          RESULT=$(curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')
          echo "Purge result: $RESULT"
