name: Fix DNS and Purge Cache

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: List DNS records and fix CNAME
        run: |
          TOKEN="${{ secrets.CLOUDFLARE_API_TOKEN }}"
          ZONE_ID="059078dc193c7878004408a8d0265927"
          
          echo "=== Current DNS Records ==="
          DNS=$(curl -s "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records" \
            -H "Authorization: Bearer $TOKEN")
          echo "$DNS" | python3 -c "import sys,json; data=json.load(sys.stdin); [print(r['id'], r['type'], r['name'], r.get('content','')) for r in data.get('result',[])]"
          
          echo "=== Purge Zone Cache ==="
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'
