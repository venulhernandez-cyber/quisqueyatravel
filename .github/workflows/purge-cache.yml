name: Fix DNS CNAME for quisqueyatravel.org

on:
  workflow_dispatch:

jobs:
  fix-dns:
    runs-on: ubuntu-latest
    steps:
      - name: Show DNS records and add CNAME
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ZONE_ID: "059078dc193c7878004408a8d0265927"
        run: |
          echo "=== Current DNS records ==="
          curl -s "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records" \
            -H "Authorization: Bearer $CF_TOKEN" | jq -r '.result[] | [.id, .type, .name, .content] | @tsv'

          echo "=== Adding CNAME quisqueyatravel.org -> quisqueyatravel.pages.dev ==="
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"type":"CNAME","name":"quisqueyatravel.org","content":"quisqueyatravel.pages.dev","proxied":true}' | jq '{success,errors}'

          echo "=== Purging Zone cache ==="
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' | jq '{success}'
