name: Lighthouse CI — Auditoria SEO y Rendimiento

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Corre automaticamente cada lunes a las 8am UTC
    - cron: '0 8 * * 1'
  workflow_dispatch:
    # Permite correrlo manualmente desde la pestana Actions

jobs:
  lighthouse:
    name: Auditar paginas con Lighthouse
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar @lhci/cli (Lighthouse CI)
        run: npm install -g @lhci/cli@0.14.x

      - name: Instalar serve (servidor local para HTML estatico)
        run: npm install -g serve

      - name: Iniciar servidor local en puerto 3000
        run: serve . -p 3000 &
        # Sirve los archivos HTML del repositorio localmente

      - name: Esperar que el servidor este listo
        run: sleep 3

      - name: Correr Lighthouse CI en paginas principales
        run: |
          lhci autorun \
            --collect.url=http://localhost:3000/index.html \
            --collect.url=http://localhost:3000/hoteles.html \
            --collect.url=http://localhost:3000/vuelos.html \
            --collect.url=http://localhost:3000/guia-punta-cana.html \
            --collect.url=http://localhost:3000/guia-santo-domingo.html \
            --collect.url=http://localhost:3000/guia-barahona.html \
            --collect.url=http://localhost:3000/guia-vuelos-nyc-rd.html \
            --collect.numberOfRuns=1 \
            --upload.target=temporary-public-storage \
            --assert.preset=lighthouse:recommended \
            --assert.assertions.categories:performance=warn \
            --assert.assertions.categories:accessibility=warn \
            --assert.assertions.categories:best-practices=warn \
            --assert.assertions.categories:seo=error \
            --assert.assertions.first-contentful-paint=warn \
            --assert.assertions.largest-contentful-paint=warn \
            --assert.assertions.total-blocking-time=warn \
            --assert.assertions.cumulative-layout-shift=warn
        continue-on-error: true
        # continue-on-error: true = el workflow reporta pero NO bloquea el deploy

      - name: Subir reporte de Lighthouse como artefacto
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-reports
          path: .lighthouseci/
          retention-days: 30

      - name: Mostrar resumen en el log
        if: always()
        run: |
          echo "===== RESUMEN LIGHTHOUSE CI ====="
          echo "Paginas auditadas:"
          echo "  - index.html (Inicio)"
          echo "  - hoteles.html (Hoteles)"
          echo "  - vuelos.html (Vuelos)"
          echo "  - guia-punta-cana.html"
          echo "  - guia-santo-domingo.html"
          echo "  - guia-barahona.html"
          echo "  - guia-vuelos-nyc-rd.html"
          echo ""
          echo "Categorias auditadas: Performance, SEO, Accesibilidad, Best Practices"
          echo "Reportes disponibles en la pestana Artifacts de esta ejecucion."
          echo "================================="
