name: Lighthouse CI — Auditoria SEO y Rendimiento

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Corre automaticamente cada lunes a las 8am UTC
    - cron: '0 8 * * 1'
  workflow_dispatch:
    # Permite correrlo manualmente desde la pestana Actions

jobs:
  lighthouse:
    name: Auditar paginas con Lighthouse
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar @lhci/cli (Lighthouse CI)
        run: npm install -g @lhci/cli@0.14.x

      - name: Instalar serve (servidor local para HTML estatico)
        run: npm install -g serve

      - name: Correr Lighthouse CI (lee configuracion de lighthouserc.js)
        run: lhci autorun
        env:
          LHCI_BUILD_CONTEXT__CURRENT_HASH: ${{ github.sha }}
          LHCI_BUILD_CONTEXT__COMMIT_TIME: ${{ github.event.head_commit.timestamp }}
          LHCI_BUILD_CONTEXT__CURRENT_BRANCH: ${{ github.ref_name }}
          LHCI_BUILD_CONTEXT__COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          LHCI_BUILD_CONTEXT__AUTHOR: ${{ github.event.head_commit.author.name }}
        # lhci autorun lee automaticamente lighthouserc.js en la raiz del repo
        continue-on-error: true

      - name: Subir reportes de Lighthouse como artefacto
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-reports-${{ github.run_number }}
          path: .lighthouseci/
          if-no-files-found: warn
          retention-days: 30

      - name: Mostrar resumen
        if: always()
        run: |
          echo "===== RESUMEN LIGHTHOUSE CI ====="
          echo "Commit: ${{ github.sha }}"
          echo "Rama: ${{ github.ref_name }}"
          echo ""
          echo "Paginas auditadas (ver lighthouserc.js):"
          echo "  index.html, hoteles.html, vuelos.html"
          echo "  guia-punta-cana.html, guia-santo-domingo.html"
          echo "  guia-barahona.html, guia-vuelos-nyc-rd.html"
          echo "  guia-jarabacoa.html, guia-santiago.html"
          echo ""
          echo "Los reportes HTML estan disponibles en la"
          echo "pestana Artifacts de esta ejecucion (30 dias)."
          echo "================================="
